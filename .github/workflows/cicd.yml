name: CI-CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Build/Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run tests
        run: |
          if [ -d tests ]; then pytest -q; else echo "No tests folder, skipping"; fi

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.EC2_APP_DIR }}
            git fetch origin main
            git reset --hard origin/main

            sudo mkdir -p /etc/smart-theatre
            sudo install -m 600 /dev/null /etc/smart-theatre/.env
            sudo install -m 600 /dev/null /etc/default/smart-theatre-generator

            # Recreate .env on EC2 from a protected GitHub secret.
            # Store the whole env file content in EC2_ENV_FILE.
            if [ -n "${{ secrets.EC2_ENV_FILE }}" ]; then
              printf "%s\n" "${{ secrets.EC2_ENV_FILE }}" > .env
              chmod 600 .env
            fi

            if [ -f .env ]; then
              sudo cp .env /etc/smart-theatre/.env
              sudo cp .env /etc/default/smart-theatre-generator
              sudo chmod 600 /etc/smart-theatre/.env /etc/default/smart-theatre-generator
            fi

            if [ ! -d venv ]; then python3 -m venv venv; fi
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            # Force generator service to use stable paths on each deploy.
            sudo mkdir -p /etc/systemd/system/smart-theatre-generator.service.d
            sudo tee /etc/systemd/system/smart-theatre-generator.service.d/override.conf > /dev/null <<EOF
            [Service]
            WorkingDirectory=${{ secrets.EC2_APP_DIR }}
            EnvironmentFile=-/etc/default/smart-theatre-generator
            EnvironmentFile=-/etc/smart-theatre/.env
            ExecStart=
            ExecStart=${{ secrets.EC2_APP_DIR }}/venv/bin/python ${{ secrets.EC2_APP_DIR }}/generate_sensors.py
            Restart=always
            RestartSec=5
            EOF
            sudo systemctl daemon-reload

            restart_and_verify() {
              svc="$1"
              if ! sudo systemctl restart "$svc"; then
                echo "[DEPLOY ERROR] restart command failed for $svc"
                sudo systemctl status "$svc" --no-pager || true
                sudo journalctl -u "$svc" -n 120 --no-pager || true
                exit 1
              fi
              if ! sudo systemctl is-active --quiet "$svc"; then
                echo "[DEPLOY ERROR] $svc failed to start"
                sudo systemctl status "$svc" --no-pager || true
                sudo journalctl -u "$svc" -n 120 --no-pager || true
                exit 1
              fi
              sudo systemctl status "$svc" --no-pager
            }

            restart_and_verify smart-theatre
            restart_and_verify smart-theatre-generator
            restart_and_verify nginx